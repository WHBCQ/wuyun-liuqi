<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五运六气 · 节气养生</title>
    <style>
:root {
    --primary: #2d5016;
    --primary-light: #4a7c2e;
    --accent: #c4a35a;
    --bg: #f8f5f0;
    --card-bg: #fff;
    --text: #333;
    --text-light: #666;
    --border: #e0d8cc;
    --warning: #b85450;
    --warning-bg: #fdf2f2;
    --advice: #4a7c2e;
    --advice-bg: #f0f7eb;
    --lifestyle: #5a7a9a;
    --lifestyle-bg: #eef3f8;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
}

.container {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px;
}

header {
    text-align: center;
    padding: 40px 0 30px;
}

header h1 {
    font-size: 2rem;
    color: var(--primary);
    margin-bottom: 8px;
    letter-spacing: 2px;
}

.subtitle {
    color: var(--text-light);
    font-size: 0.95rem;
}

.input-section {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    margin-bottom: 20px;
}

.input-section h2 {
    font-size: 1.2rem;
    color: var(--primary);
    margin-bottom: 24px;
    text-align: center;
}

.form-group {
    margin-bottom: 18px;
}

.form-group label {
    display: block;
    margin-bottom: 6px;
    font-size: 0.9rem;
    color: var(--text);
    font-weight: 500;
}

.form-group input,
.form-group select {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 1rem;
    background: #fafafa;
    transition: border-color 0.2s;
}

.form-group input:focus,
.form-group select:focus {
    outline: none;
    border-color: var(--primary-light);
}

.radio-group {
    display: flex;
    gap: 20px;
}

.radio-group label {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-weight: normal;
}

.radio-group input[type="radio"] {
    width: auto;
    cursor: pointer;
}

.btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 10px;
}

.btn-primary:hover {
    background: var(--primary-light);
}

.result-section {
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}

.result-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

.result-card h2 {
    font-size: 1.3rem;
    color: var(--primary);
    text-align: center;
    margin-bottom: 8px;
}

.current-time {
    text-align: center;
    color: var(--text-light);
    font-size: 0.85rem;
    margin-bottom: 20px;
}

.section-divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
}

.info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.info-item h3,
.info-full h3 {
    font-size: 0.95rem;
    color: var(--primary);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--accent);
    display: inline-block;
}

.info-content {
    font-size: 0.9rem;
    color: var(--text);
    line-height: 1.8;
}

.info-content .tag {
    display: inline-block;
    background: var(--bg);
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 0.8rem;
    margin: 2px 4px 2px 0;
    color: var(--text-light);
}

.warning-box,
.advice-box,
.lifestyle-box {
    margin-top: 20px;
    padding: 20px;
    border-radius: 12px;
}

.warning-box {
    background: var(--warning-bg);
    border-left: 4px solid var(--warning);
}

.advice-box {
    background: var(--advice-bg);
    border-left: 4px solid var(--advice);
}

.lifestyle-box {
    background: var(--lifestyle-bg);
    border-left: 4px solid var(--lifestyle);
}

.warning-box h3,
.advice-box h3,
.lifestyle-box h3 {
    font-size: 1rem;
    margin-bottom: 12px;
}

.warning-box h3 { color: var(--warning); }
.advice-box h3 { color: var(--advice); }
.lifestyle-box h3 { color: var(--lifestyle); }

.warning-box ul,
.advice-box ul,
.lifestyle-box ul {
    margin-left: 18px;
    font-size: 0.9rem;
    line-height: 2;
}

.warning-box li,
.advice-box li,
.lifestyle-box li {
    margin-bottom: 4px;
}

footer {
    text-align: center;
    padding: 30px 0;
    font-size: 0.8rem;
    color: var(--text-light);
}

@media (max-width: 600px) {
    .info-grid {
        grid-template-columns: 1fr;
    }
    header h1 {
        font-size: 1.5rem;
    }
    .container {
        padding: 12px;
    }
    .input-section,
    .result-card {
        padding: 20px;
    }
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>五运六气 · 节气养生</h1>
            <p class="subtitle">输入生辰，知晓当下节气对你的影响</p>
        </header>

        <main>
            <section class="input-section">
                <h2>请输入您的出生信息</h2>
                <form id="birthForm">
                    <div class="form-group">
                        <label for="birthYear">出生年份</label>
                        <input type="number" id="birthYear" min="1900" max="2100" required placeholder="例如：1990">
                    </div>
                    <div class="form-group">
                        <label for="birthMonth">出生月份</label>
                        <input type="number" id="birthMonth" min="1" max="12" required placeholder="1-12">
                    </div>
                    <div class="form-group">
                        <label for="birthDay">出生日期</label>
                        <input type="number" id="birthDay" min="1" max="31" required placeholder="1-31">
                    </div>
                    <div class="form-group">
                        <label for="birthHour">出生时辰（可选）</label>
                        <select id="birthHour">
                            <option value="">未知</option>
                            <option value="0">子时 (23:00-01:00)</option>
                            <option value="1">丑时 (01:00-03:00)</option>
                            <option value="2">寅时 (03:00-05:00)</option>
                            <option value="3">卯时 (05:00-07:00)</option>
                            <option value="4">辰时 (07:00-09:00)</option>
                            <option value="5">巳时 (09:00-11:00)</option>
                            <option value="6">午时 (11:00-13:00)</option>
                            <option value="7">未时 (13:00-15:00)</option>
                            <option value="8">申时 (15:00-17:00)</option>
                            <option value="9">酉时 (17:00-19:00)</option>
                            <option value="10">戌时 (19:00-21:00)</option>
                            <option value="11">亥时 (21:00-23:00)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>性别</label>
                        <div class="radio-group">
                            <label><input type="radio" name="gender" value="male" checked> 男</label>
                            <label><input type="radio" name="gender" value="female"> 女</label>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">查看当下节气影响</button>
                </form>
            </section>

            <section class="result-section" id="resultSection" style="display:none;">
                <div class="result-card">
                    <h2>您的运气分析报告</h2>
                    <div class="current-time" id="currentTime"></div>
                    
                    <div class="section-divider"></div>
                    
                    <div class="info-full" style="background:#fdf8f0;border-radius:12px;padding:20px;border-left:4px solid #8b4513;">
                        <h3 style="color:#8b4513;">📜 年度运气底色</h3>
                        <div id="yearDiseaseInfo" class="info-content"></div>
                    </div>

                    <div class="section-divider"></div>
                    
                    <div class="info-grid">
                        <div class="info-item">
                            <h3>先天体质</h3>
                            <div id="constitutionInfo" class="info-content"></div>
                        </div>
                        <div class="info-item">
                            <h3>今年大环境</h3>
                            <div id="yearEnvInfo" class="info-content"></div>
                        </div>
                    </div>

                    <div class="section-divider"></div>

                    <div class="info-full">
                        <h3>当下节气</h3>
                        <div id="solarTermInfo" class="info-content"></div>
                    </div>

                    <div class="section-divider"></div>

                    <div class="info-full" style="background:#f0f7eb;border-radius:12px;padding:20px;border-left:4px solid #4a7c2e;">
                        <h3 style="color:#4a7c2e;">司天在泉 · 饮食调养</h3>
                        <div id="zaiquanDietInfo" class="info-content"></div>
                    </div>

                    <div class="section-divider"></div>

                    <div class="warning-box">
                        <h3>⚠️ 可能出现的不适</h3>
                        <div id="warningInfo"></div>
                    </div>

                    <div class="advice-box">
                        <h3>🌿 注意事项</h3>
                        <div id="noticeInfo"></div>
                    </div>

                    <div class="lifestyle-box">
                        <h3>🏠 起居建议</h3>
                        <div id="lifestyleInfo"></div>
                    </div>

                    <div class="section-divider"></div>

                    <div class="lifestyle-box" style="background:#fdf2f8;border-left-color:#c0392b;">
                        <h3 style="color:#c0392b;">❤️ 情志调摄</h3>
                        <div id="emotionInfo"></div>
                    </div>

                    <div class="section-divider"></div>

                    <div class="info-full" style="background:#f5f0ff;border-radius:12px;padding:20px;border-left:4px solid #6b5b95;">
                        <h3 style="color:#6b5b95;">🔮 V2.1 深化分析</h3>
                        <div id="v21Info" class="info-content"></div>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>基于《黄帝内经》五运六气理论 · 仅供参考，不适请就医</p>
            <p style="margin-top:4px;font-size:0.75rem;opacity:0.7;">"谷肉果菜，食养尽之" ——《素问·五常政大论》</p>
        </footer>
    </div>

    <script>
// ============================================================
// 时候 V2.0 增强模块
// 编码日期：2026-04-28
// 来源：《素问》五篇大论（五运行/气交变/天元纪/六微旨/五常政）
// ============================================================

const WuYunV2 = {
    
    // ──────────────────────────────────────────
    // 增强D/F：年度病候数据库（气交变大论）
    // ──────────────────────────────────────────
    yearDiseasePatterns: {
        // 太过
        '木太过': {
            name: '发生', climate: '风气流行', victim: '脾土', victimOrgan: '脾',
            symptoms: ['飧泄', '食减', '体重', '烦冤', '肠鸣', '腹支满'],
            severe: ['忽忽善怒', '眩冒巅疾'],
            fatalPulse: '冲阳绝',
            source: '岁木太过，风气流行，脾土受邪'
        },
        '火太过': {
            name: '赫曦', climate: '炎暑流行', victim: '金肺', victimOrgan: '肺',
            symptoms: ['疟', '少气咳喘', '血溢', '血泄注下', '嗌燥', '耳聋', '中热肩背热'],
            severe: ['胸中痛', '胁支满胁痛', '膺背肩胛间痛', '两臂内痛'],
            fatalPulse: '太渊绝',
            source: '岁火太过，炎暑流行，金肺受邪'
        },
        '土太过': {
            name: '敦阜', climate: '雨湿流行', victim: '肾水', victimOrgan: '肾',
            symptoms: ['腹痛', '清厥意不乐', '体重', '烦冤'],
            severe: ['肌肉萎', '足痿不收', '行善瘈', '四支不举'],
            fatalPulse: '太谿绝',
            source: '岁土太过，雨湿流行，肾水受邪'
        },
        '金太过': {
            name: '坚成', climate: '燥气流行', victim: '肝木', victimOrgan: '肝',
            symptoms: ['两胁下少腹痛', '目赤痛眦疡', '耳无所闻'],
            severe: ['喘咳逆气', '尻阴股膝髀腨䯒足皆病'],
            fatalPulse: '太冲绝',
            source: '岁金太过，燥气流行，肝木受邪'
        },
        '水太过': {
            name: '流衍', climate: '寒气流行', victim: '心火', victimOrgan: '心',
            symptoms: ['身热烦心', '躁悸', '阴厥上下中寒', '谵妄心痛'],
            severe: ['腹大胫肿', '喘咳', '寝汗出憎风'],
            fatalPulse: '神门绝',
            source: '岁水太过，寒气流行，邪害心火'
        },
        // 不及（含复气）
        '木不及': {
            name: '委和', climate: '燥乃大行', victim: '肝木', victimOrgan: '肝',
            symptoms: ['中清', '胠胁痛', '少腹痛', '肠鸣溏泄'],
            severe: ['寒热疮疡疿胗痈痤'],
            fatalPulse: '',
            fuQi: '炎暑流火，湿性燥',
            fuSymptoms: ['寒热疮疡', '疿胗痈痤'],
            source: '岁木不及，燥乃大行，生气失应'
        },
        '火不及': {
            name: '伏明', climate: '寒乃大行', victim: '心火', victimOrgan: '心',
            symptoms: ['胸中痛', '胁支满', '两胁痛', '膺背肩胛间及两臂内痛', '郁冒朦昧', '心痛暴瘖'],
            severe: ['屈不能伸', '髋髀如别'],
            fatalPulse: '',
            fuQi: '埃郁大雨至，黑气乃辱',
            fuSymptoms: ['溏腹满', '寒中肠鸣', '暴挛痿痹'],
            source: '岁火不及，寒乃大行，长政不用'
        },
        '土不及': {
            name: '卑监', climate: '风乃大行', victim: '脾土', victimOrgan: '脾',
            symptoms: ['飧泄霍乱', '体重腹痛', '筋骨繇复', '肌肉瞤酸'],
            severe: ['留满否塞', '飧泄'],
            fatalPulse: '',
            fuQi: '收政严峻，名木苍凋',
            fuSymptoms: ['胸胁暴痛', '善太息'],
            source: '岁土不及，风乃大行，化气不令'
        },
        '金不及': {
            name: '从革', climate: '炎火乃行', victim: '肺金', victimOrgan: '肺',
            symptoms: ['肩背瞀重', '鼽嚏血便注下'],
            severe: ['口疮', '心痛'],
            fatalPulse: '',
            fuQi: '寒雨暴至，冰雹霜雪',
            fuSymptoms: ['阴厥且格', '头脑户痛', '发热'],
            source: '岁金不及，炎火乃行，生气乃用'
        },
        '水不及': {
            name: '涸流', climate: '湿乃大行', victim: '肾水', victimOrgan: '肾',
            symptoms: ['腹满', '身重', '濡泄', '腰股痛发', '足痿', '清厥'],
            severe: ['跗肿', '癃閟'],
            fatalPulse: '',
            fuQi: '大风暴发，草偃木零',
            fuSymptoms: ['面色时变', '筋骨并辟', '目视䀮䀮'],
            source: '岁水不及，湿乃大行，藏气不政'
        }
    },

    // ──────────────────────────────────────────
    // 增强E：年度风险评估算法
    // ──────────────────────────────────────────
    analyzeYearRisk: function(yearPattern, constitution) {
        if (!yearPattern || !constitution) return { level: 'UNKNOWN', desc: '' };
        
        const victimOrgan = yearPattern.victimOrgan;
        const weakOrgan = constitution.weak;
        const strongOrgan = constitution.strong;
        const userOrgan = constitution.organ; // 先天本脏
        
        let level = 'MEDIUM';
        let desc = '';
        
        // 弱脏遇克 → 高危
        if (weakOrgan === victimOrgan) {
            level = 'HIGH';
            desc = `先天${weakOrgan}偏弱，今年${victimOrgan}受年运克伐，双重承压。`;
        }
        // 本脏遇克 → 中高危
        else if (userOrgan === victimOrgan) {
            level = 'HIGH';
            desc = `先天${userOrgan}为本脏，今年${victimOrgan}受年运克伐，本气受损。`;
        }
        // 强脏遇克 → 低危（能扛）
        else if (strongOrgan === victimOrgan) {
            level = 'LOW';
            desc = `先天${strongOrgan}偏旺，今年虽${victimOrgan}受克，你尚有抗衡之力。`;
        }
        // 中性
        else {
            level = 'MEDIUM';
            desc = `今年${victimOrgan}受年运克伐，你的${victimOrgan}既非最强也非最弱，常规注意即可。`;
        }
        
        return { level, desc, victimOrgan };
    },

    // ──────────────────────────────────────────
    // 增强I/L：特殊年份判定
    // ──────────────────────────────────────────
    tianFuMap: {
        '少阴君火': '火', '少阳相火': '火',
        '太阴湿土': '土',
        '阳明燥金': '金',
        '太阳寒水': '水',
        '厥阴风木': '木'
    },
    
    suiHuiMap: {
        '木': ['卯'], '火': ['午'],
        '土': ['辰','戌','丑','未'],
        '金': ['酉'], '水': ['子']
    },
    
    getYearSpecialStatus: function(yearGan, yearZhi) {
        const wuyun = WuYunLiuQi.calcWuYun(yearGan);
        const sitian = WuYunLiuQi.siTianMap[yearZhi];
        if (!wuyun || !sitian) return null;
        
        const wuyunElement = wuyun.element;
        const sitianElement = this.tianFuMap[sitian.qi];
        const isTianFu = wuyunElement === sitianElement;
        const isSuiHui = this.suiHuiMap[wuyunElement]?.includes(yearZhi);
        
        if (isSuiHui && isTianFu) {
            return { type: '太乙天符', level: 'CRITICAL', desc: '天地人三气叠加，气候最烈，病暴而死', color: 'critical' };
        }
        if (isTianFu) {
            return { type: '天符', level: 'HIGH', desc: '司天与中运同气，病速而危', color: 'high' };
        }
        if (isSuiHui) {
            return { type: '岁会', level: 'LOW', desc: '气之平也，反而平和', color: 'low' };
        }
        return null;
    },

    // ──────────────────────────────────────────
    // 增强M：亢害承制
    // ──────────────────────────────────────────
    chengZhiMap: {
        '木': { cheng: '金', chengOrgan: '肺', food: '百合、银耳、梨' },
        '火': { cheng: '水', chengOrgan: '肾', food: '黑豆、黑芝麻、核桃' },
        '土': { cheng: '木', chengOrgan: '肝', food: '枸杞、菠菜、山楂' },
        '金': { cheng: '火', chengOrgan: '心', food: '红枣、红豆、西红柿' },
        '水': { cheng: '土', chengOrgan: '脾', food: '山药、小米、南瓜' }
    },
    
    getChengZhiAdvice: function(yearElement) {
        const cz = this.chengZhiMap[yearElement];
        if (!cz) return null;
        return {
            text: `${yearElement}亢则${cz.cheng}承。健运${cz.chengOrgan}，助自然制衡之力。`,
            food: `宜食${cz.food}以实${cz.chengOrgan}气。`
        };
    },

    // ──────────────────────────────────────────
    // 增强O：司天下临病候
    // ──────────────────────────────────────────
    sitianXialin: {
        '少阳相火': {
            xialin: '火气', zang: '肺',
            symptoms: ['咳嚏', '鼽衄', '鼻窒', '寒热', '胕肿', '心痛', '胃脘痛'],
            desc: '火气下临，肺气上从，白起金用'
        },
        '阳明燥金': {
            xialin: '燥气', zang: '肝',
            symptoms: ['胁痛', '目赤', '掉振鼓慄', '筋痿', '不能久立', '暴热', '小便变'],
            desc: '燥气下临，肝气上从，苍起木用'
        },
        '太阳寒水': {

<script>
const Lunar = {
    gan: ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'],
    zhi: ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'],
    solarTerms: [
        '立春','雨水','惊蛰','春分','清明','谷雨',
        '立夏','小满','芒种','夏至','小暑','大暑',
        '立秋','处暑','白露','秋分','寒露','霜降',
        '立冬','小雪','大雪','冬至','小寒','大寒'
    ],
    
    getYearGanZhi: function(year, month, day) {
        const liChunMonth = 2;
        const liChunDay = 4;
        
        let effectiveYear = year;
        if (month < liChunMonth || (month === liChunMonth && day < liChunDay)) {
            effectiveYear = year - 1;
        }
        
        const baseYear = 1984;
        const offset = effectiveYear - baseYear;
        const ganIndex = ((offset % 10) + 10) % 10;
        const zhiIndex = ((offset % 12) + 12) % 12;
        
        return {
            gan: this.gan[ganIndex],
            zhi: this.zhi[zhiIndex],
            ganZhi: this.gan[ganIndex] + this.zhi[zhiIndex],
            ganIndex: ganIndex,
            zhiIndex: zhiIndex,
            year: effectiveYear
        };
    },
    
    getCurrentSolarTerm: function(date) {
        const year = date.getFullYear();
        const month = date.getMonth() + 1;
        const day = date.getDate();
        
        const termApprox = [
            {name:'立春', month:2, day:4}, {name:'雨水', month:2, day:19},
            {name:'惊蛰', month:3, day:6}, {name:'春分', month:3, day:21},
            {name:'清明', month:4, day:5}, {name:'谷雨', month:4, day:20},
            {name:'立夏', month:5, day:6}, {name:'小满', month:5, day:21},
            {name:'芒种', month:6, day:6}, {name:'夏至', month:6, day:21},
            {name:'小暑', month:7, day:7}, {name:'大暑', month:7, day:23},
            {name:'立秋', month:8, day:8}, {name:'处暑', month:8, day:23},
            {name:'白露', month:9, day:8}, {name:'秋分', month:9, day:23},
            {name:'寒露', month:10, day:8}, {name:'霜降', month:10, day:23},
            {name:'立冬', month:11, day:7}, {name:'小雪', month:11, day:22},
            {name:'大雪', month:12, day:7}, {name:'冬至', month:12, day:22},
            {name:'小寒', month:1, day:6}, {name:'大寒', month:1, day:20}
        ];
        
        let currentTerm = null;
        let nextTerm = null;
        let termIndex = 0;
        
        for (let i = 0; i < termApprox.length; i++) {
            const term = termApprox[i];
            const next = termApprox[(i + 1) % 24];
            
            const termDate = new Date(year, term.month - 1, term.day);
            let nextDate = new Date(year, next.month - 1, next.day);
            if (next.month < term.month) {
                nextDate = new Date(year + 1, next.month - 1, next.day);
            }
            
            const currentDate = new Date(year, month - 1, day);
            
            if (currentDate >= termDate && currentDate < nextDate) {
                currentTerm = term;
                nextTerm = next;
                termIndex = i;
                break;
            }
        }
        
        if (!currentTerm) {
            const firstTerm = termApprox[0];
            const lastTerm = termApprox[23];
            const lastDate = new Date(year - 1, lastTerm.month - 1, lastTerm.day);
            const firstDate = new Date(year, firstTerm.month - 1, firstTerm.day);
            const currentDate = new Date(year, month - 1, day);
            
            if (currentDate >= lastDate && currentDate < firstDate) {
                currentTerm = lastTerm;
                nextTerm = firstTerm;
                termIndex = 23;
            }
        }
        
        return {
            current: currentTerm,
            next: nextTerm,
            index: termIndex
        };
    },
    
    getFullGanZhi: function(year, month, day, hour) {
        const yearGZ = this.getYearGanZhi(year, month, day);
        
        const yearGanIndex = yearGZ.ganIndex;
        let monthGanStart;
        if (yearGanIndex === 0 || yearGanIndex === 5) monthGanStart = 2;
        else if (yearGanIndex === 1 || yearGanIndex === 6) monthGanStart = 4;
        else if (yearGanIndex === 2 || yearGanIndex === 7) monthGanStart = 6;
        else if (yearGanIndex === 3 || yearGanIndex === 8) monthGanStart = 8;
        else monthGanStart = 0;
        
        const lunarMonth = ((month - 2 + 12) % 12);
        const monthGanIndex = (monthGanStart + lunarMonth) % 10;
        const monthZhiIndex = (2 + lunarMonth) % 12;
        
        const baseDate = new Date(1900, 0, 31);
        const targetDate = new Date(year, month - 1, day);
        const diffDays = Math.floor((targetDate - baseDate) / (1000 * 60 * 60 * 24));
        const dayGanIndex = (diffDays % 10 + 10) % 10;
        const dayZhiIndex = (diffDays % 12 + 12) % 12;
        
        let hourZhiIndex = 0;
        if (hour !== null && hour !== undefined && hour !== '') {
            hourZhiIndex = Math.floor((parseInt(hour) + 1) % 12);
        }
        const hourGanStart = (dayGanIndex % 5) * 2;
        const hourGanIndex = (hourGanStart + hourZhiIndex) % 10;
        
        return {
            year: yearGZ,
            month: {
                gan: this.gan[monthGanIndex],
                zhi: this.zhi[monthZhiIndex],
                ganZhi: this.gan[monthGanIndex] + this.zhi[monthZhiIndex],
                ganIndex: monthGanIndex,
                zhiIndex: monthZhiIndex
            },
            day: {
                gan: this.gan[dayGanIndex],
                zhi: this.zhi[dayZhiIndex],
                ganZhi: this.gan[dayGanIndex] + this.zhi[dayZhiIndex],
                ganIndex: dayGanIndex,
                zhiIndex: dayZhiIndex
            },
            hour: hour !== null && hour !== undefined && hour !== '' ? {
                gan: this.gan[hourGanIndex],
                zhi: this.zhi[hourZhiIndex],
                ganZhi: this.gan[hourGanIndex] + this.zhi[hourZhiIndex],
                ganIndex: hourGanIndex,
                zhiIndex: hourZhiIndex
            } : null
        };
    }
};

            '金': {
                organ: '肺',
                tendency: type === '太过' ? '肺气偏燥，易干咳' : '肺气偏弱，易感冒',
                weak: type === '太过' ? '肝' : '脾',
                strong: '肺'
            },
            '水': {
                organ: '肾',
                tendency: type === '太过' ? '肾水偏寒，易畏寒' : '肾气偏弱，易腰酸',
                weak: type === '太过' ? '心' : '肾',
                strong: '肾'
            }
        };
        
        return {
            wuYun: wuYun,
            constitution: constitutionMap[element]
        };
    }
};

    <script>
const Advice = {
    generate: function(birthGZ, currentYearGZ, qiInfo, keZhuAnalysis) {
        return {
            constitution: this.getConstitutionDesc(birthGZ),
            yearEnv: this.getYearEnvDesc(currentYearGZ),
            solarTerm: this.getSolarTermDesc(qiInfo),
            warnings: this.getWarnings(birthGZ, currentYearGZ, qiInfo, keZhuAnalysis),
            notices: this.getNotices(birthGZ, currentYearGZ, qiInfo, keZhuAnalysis),
            lifestyle: this.getLifestyle(birthGZ, currentYearGZ, qiInfo, keZhuAnalysis)
        };
    },
    
    getConstitutionDesc: function(birthGZ) {
        const wuYun = WuYunLiuQi.calcWuYun(birthGZ.year.gan);
        const constitution = WuYunLiuQi.analyzeConstitution(birthGZ.year.gan);
        
        if (!constitution) return '';
        
        const c = constitution.constitution;
        return `
            <span class="tag">${birthGZ.year.ganZhi}年</span>
            <span class="tag">${wuYun.element}运${wuYun.type}</span>
            <br><br>
            <strong>先天体质特点：</strong>${c.tendency}<br>
            <strong>相对偏弱：</strong>${c.weak}脏<br>
            <strong>相对偏强：</strong>${c.strong}脏

    },
    
    getYearEnvDesc: function(currentYearGZ) {
        const stzq = WuYunLiuQi.calcSiTianZaiQuan(currentYearGZ.year.zhi);
        const wuYun = WuYunLiuQi.calcWuYun(currentYearGZ.year.gan);
        
        if (!stzq) return '';
        
        return `
            <span class="tag">${currentYearGZ.year.ganZhi}年</span>
            <span class="tag">${wuYun.element}运${wuYun.type}</span>
            <span class="tag">${stzq.siTian}司天</span>

        `;
    },
    
    getSolarTermDesc: function(qiInfo) {
        if (!qiInfo || !qiInfo.zhuQi || !qiInfo.keQi) return '';
        
        return `
            <strong>当前主气：</strong>第${qiInfo.step}步 · ${qiInfo.zhuQi.name}（${qiInfo.zhuQi.nature}）<br>
            <strong>当前客气：</strong>${qiInfo.keQi.name}（${qiInfo.keQi.nature}）<br>
            <strong>对应脏腑：</strong>${qiInfo.zhuQi.organ}、${WuYunLiuQi.getOrganByQi(qiInfo.keQi.name)}
        `;
    },
    
    getWarnings: function(birthGZ, currentYearGZ, qiInfo, keZhuAnalysis) {
        const warnings = [];
        
        const constitution = WuYunLiuQi.analyzeConstitution(birthGZ.year.gan);
        const stzq = WuYunLiuQi.calcSiTianZaiQuan(currentYearGZ.year.zhi);
        
        if (!constitution || !stzq || !qiInfo) return warnings;
        
        const c = constitution.constitution;
        const zhuQi = qiInfo.zhuQi;
        const keQi = qiInfo.keQi;
        
        const weakOrgan = c.weak;
        const keOrgan = WuYunLiuQi.getOrganByQi(keQi.name);
        
        if (keOrgan === weakOrgan) {
            warnings.push(`<strong>${weakOrgan}气本弱</strong>，逢${keQi.name}客气当令，${weakOrgan}系统负担加重`);
        }
        
        if (keZhuAnalysis) {
            if (keZhuAnalysis.tendency === '外邪易入') {
                warnings.push(`<strong>客胜主（顺）</strong>：外邪容易侵袭${zhuQi.organ}，出现${this.getOrganSymptoms(zhuQi.organ)}`);
            } else if (keZhuAnalysis.tendency === '气机内郁') {
                warnings.push(`<strong>主胜客（逆）</strong>：气机郁滞于内，${zhuQi.organ}功能不畅，可能出现${this.getOrganSymptoms(zhuQi.organ)}`);
            }
        }
        
        const siTianNature = stzq.siTianNature;
        const constitutionElement = c.strong;
        
        if (siTianNature === '寒' && constitutionElement === '心') {
            warnings.push(`<strong>寒水司天 + 心阳偏弱</strong>：心寒相交，易出现心悸、畏寒、四肢不温`);
        }
        if (siTianNature === '热' && constitutionElement === '肾') {

        }
        
        if (zhuQi.nature === '湿') {
            warnings.push(`<strong>湿土当令</strong>：湿气困脾，易出现腹胀、食欲减退、肢体困重`);
        }
        if (zhuQi.nature === '燥') {
            warnings.push(`<strong>燥金当令</strong>：燥邪伤肺，易出现咽干、干咳、皮肤干燥`);
        }
        if (zhuQi.nature === '风') {
            warnings.push(`<strong>风木当令</strong>：风性善行数变，易出现头痛、眩晕、肢体麻木`);
        }
        if (zhuQi.nature === '寒') {
            warnings.push(`<strong>寒水当令</strong>：寒邪伤阳，易出现关节痛、腹痛、畏寒`);
        }
        
        const wuYun = WuYunLiuQi.calcWuYun(currentYearGZ.year.gan);

    },
    
    getNotices: function(birthGZ, currentYearGZ, qiInfo, keZhuAnalysis) {

        }
        if (c.organ === '心') {
            notices.push('避免熬夜，23点前入睡最宜');
            notices.push('情绪激动时做深呼吸，防止心火亢盛');
        }
        if (c.organ === '脾') {
            notices.push('饮食定时定量，避免暴饮暴食');
            notices.push('生冷瓜果节制，尤其冰箱取出需回温');
        }
        if (c.organ === '肺') {
            notices.push('雾霾天减少户外运动，出门戴口罩');
            notices.push('秋季干燥时多饮温水，保持室内湿度');

    <script>
document.addEventListener('DOMContentLoaded', function() {
    const birthForm = document.getElementById('birthForm');
    const resultSection = document.getElementById('resultSection');
    
    birthForm.addEventListener('submit', function(e) {
        e.preventDefault();
        
        const year = parseInt(document.getElementById('birthYear').value);
        const month = parseInt(document.getElementById('birthMonth').value);
        const day = parseInt(document.getElementById('birthDay').value);
        const hour = document.getElementById('birthHour').value;
        
        if (!year || !month || !day) {
            alert('请填写完整的出生日期');
            return;
        }
        
        // 计算出生干支
        const birthGZ = Lunar.getFullGanZhi(year, month, day, hour);
        
        // 获取当前时间
        const now = new Date();
        const currentYearGZ = Lunar.getYearGanZhi(now.getFullYear(), now.getMonth() + 1, now.getDate());
        const currentGZ = Lunar.getFullGanZhi(now.getFullYear(), now.getMonth() + 1, now.getDate(), '');
        
        // 获取当前节气
        const solarTerm = Lunar.getCurrentSolarTerm(now);
        
        // 计算司天在泉
        const stzq = WuYunLiuQi.calcSiTianZaiQuan(currentGZ.year.zhi);
        
        // 计算当前主气客气
        let qiInfo = null;
        if (stzq && solarTerm) {
            qiInfo = WuYunLiuQi.getCurrentQi(solarTerm.index, stzq.siTian);
        }
        
        // 客主加临分析
        let keZhuAnalysis = null;
        if (qiInfo && qiInfo.zhuQi && qiInfo.keQi) {
            keZhuAnalysis = WuYunLiuQi.analyzeKeZhu(qiInfo.zhuQi, qiInfo.keQi);
        }
        
        // 生成建议
        const advice = Advice.generate(birthGZ, currentGZ, qiInfo, keZhuAnalysis);
        
        // 显示结果
        displayResults(advice, now, solarTerm, birthGZ, currentGZ);
        
        // 滚动到结果
        resultSection.style.display = 'block';
        resultSection.scrollIntoView({ behavior: 'smooth' });
    });
    
    function displayResults(advice, now, solarTerm, birthGZ, currentGZ) {
        // 当前时间
        const timeStr = now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日';
        let termStr = '';
        if (solarTerm && solarTerm.current) {
            termStr = ' · 当前节气：' + solarTerm.current.name;
        }
        document.getElementById('currentTime').textContent = timeStr + termStr;
        
        // 年度运气底色（V2增强）
        if (typeof AdviceV2 !== 'undefined' && birthGZ && currentGZ) {
            const yearDiseaseHtml = AdviceV2.getYearDiseaseWarning(birthGZ, currentGZ);
            if (yearDiseaseHtml) {
                document.getElementById('yearDiseaseInfo').innerHTML = yearDiseaseHtml;
            }
            
            // 司天下临增强
            const sitianHtml = AdviceV2.getSitianWarning(currentGZ);
            if (sitianHtml) {
                advice.yearEnv += '<br><br>' + sitianHtml;
            }
            
            // 在泉饮食
            const zaiquanHtml = AdviceV2.getZaiquanDietAdvice(currentGZ);
            if (zaiquanHtml) {
                document.getElementById('zaiquanDietInfo').innerHTML = zaiquanHtml;
            }
            
            // 情志调摄
            const constitution = WuYunLiuQi.analyzeConstitution(birthGZ.year.gan);
            const emotionList = AdviceV2.getEmotionAdvice(constitution);
            if (emotionList.length > 0) {
                const emotionHtml = '<ul>' + emotionList.map(e => '<li>' + e + '</li>').join('') + '</ul>';
                document.getElementById('emotionInfo').innerHTML = emotionHtml;
            }
        }
        
        // 先天体质
        document.getElementById('constitutionInfo').innerHTML = advice.constitution;
        
        // 今年大环境
        document.getElementById('yearEnvInfo').innerHTML = advice.yearEnv;
        
        // 当下节气
        document.getElementById('solarTermInfo').innerHTML = advice.solarTerm;
        
        // 可能出现的不适
        const warningHtml = advice.warnings.length > 0 
            ? '<ul>' + advice.warnings.map(w => '<li>' + w + '</li>').join('') + '</ul>'
            : '<p>当前运气平和，暂无特殊预警</p>';
        document.getElementById('warningInfo').innerHTML = warningHtml;
        
        // 注意事项
        const noticeHtml = advice.notices.length > 0
            ? '<ul>' + advice.notices.map(n => '<li>' + n + '</li>').join('') + '</ul>'
            : '<p>常规养生即可</p>';
        document.getElementById('noticeInfo').innerHTML = noticeHtml;
        
        // 起居建议
        const lifestyleHtml = advice.lifestyle.length > 0
            ? '<ul>' + advice.lifestyle.map(l => '<li>' + l + '</li>').join('') + '</ul>'
            : '<p>保持规律作息</p>';
        document.getElementById('lifestyleInfo').innerHTML = lifestyleHtml;
        
        // V2.1 深化分析
        console.log('[时候] V2.1 displayResults 触发检查: WuYunV21存在?', typeof WuYunV21 !== 'undefined', 'birthGZ?', !!birthGZ, 'currentGZ?', !!currentGZ, 'qiInfo?', !!qiInfo);
        if (typeof WuYunV21 !== 'undefined' && birthGZ && currentGZ && qiInfo) {
            try {
                // 重新获取 constitution（解决作用域问题）
                const v21Constitution = WuYunLiuQi.analyzeConstitution(birthGZ.year.gan);
                console.log('[时候] V2.1 constitution:', v21Constitution);
                const v21Result = WuYunV21.analyzeV21(
                    currentGZ.year.gan + currentGZ.year.zhi,
                    v21Constitution,
                    {
                        zhuQi: qiInfo.zhuQi,
                        keQi: qiInfo.keQi,
                        siTian: stzq ? stzq.siTian : null,
                        keZhuRelation: keZhuAnalysis,
                        solarTerm: solarTerm && solarTerm.current ? solarTerm.current.name : null
                    }
                );
                
                if (v21Result && v21Result.modules && v21Result.modules.length > 0) {
                    let v21Html = '<div style="display:grid;grid-template-columns:1fr;gap:16px;">';
                    
                    for (const mod of v21Result.modules) {
                        v21Html += `<div style="background:#faf8ff;border-radius:10px;padding:16px;border-left:3px solid #6b5b95;">`;
                        v21Html += `<h4 style="color:#6b5b95;margin-bottom:10px;font-size:0.95rem;">${mod.name}</h4>`;
                        
                        if (mod.code === 'T' && mod.data) {
                            for (const wx of mod.data) {
                                v21Html += `<p style="margin:6px 0;font-size:0.85rem;"><strong>${wx.organ}</strong>(${wx.condition})：宜${wx.shouldUse}味（${wx.shouldUseFood.join('、')}），忌${wx.shouldAvoid}味</p>`;
                            }
                        } else if (mod.code === 'U' && mod.data) {
                            v21Html += `<p style="margin:6px 0;font-size:0.85rem;">主气${mod.data.zhuQi.qiName}：${mod.data.zhuQi.congHua} → ${mod.data.zhuQi.result}</p>`;
                            v21Html += `<p style="margin:6px 0;font-size:0.85rem;">客气${mod.data.keQi.qiName}：${mod.data.keQi.congHua} → ${mod.data.keQi.result}</p>`;
                            v21Html += `<p style="margin:6px 0;font-size:0.85rem;color:#888;">${mod.data.compoundNature}</p>`;
                        } else if (mod.code === 'V' && mod.data) {
                            v21Html += `<p style="margin:6px 0;font-size:0.85rem;"><strong>客气胜：</strong>${mod.data.keSheng.symptoms.slice(0,4).join('、')}...</p>`;
                            v21Html += `<p style="margin:6px 0;font-size:0.85rem;"><strong>主气胜：</strong>${mod.data.zhuSheng.symptoms.slice(0,4).join('、')}...</p>`;
                            if (mod.data.dominant) {
                                v21Html += `<p style="margin:6px 0;font-size:0.85rem;color:#b85450;">${mod.data.dominant} · ${mod.data.advice}</p>`;
                            }
                        } else if (mod.code === 'W' && mod.data) {
                            v21Html += `<p style="margin:6px 0;font-size:0.85rem;">上治${mod.data.therapy.shang.taste}（${mod.data.therapy.shang.target}）</p>`;
                            v21Html += `<p style="margin:6px 0;font-size:0.85rem;">中治${mod.data.therapy.zhong.taste}（${mod.data.therapy.zhong.target}）</p>`;
                            v21Html += `<p style="margin:6px 0;font-size:0.85rem;">下治${mod.data.therapy.xia.taste}（${mod.data.therapy.xia.target}）</p>`;
                        } else if (mod.code === 'X' && mod.data) {
                            v21Html += `<p style="margin:6px 0;font-size:0.85rem;"><strong>${mod.data.name}</strong> · 风险等级：${mod.data.riskLevel}</p>`;
                            v21Html += `<p style="margin:6px 0;font-size:0.85rem;">预警信号：${mod.data.warningSigns.slice(0,3).join('、')}...</p>`;
                            v21Html += `<p style="margin:6px 0;font-size:0.85rem;color:#888;">${mod.data.advice}</p>`;
                        } else if (mod.code === 'Y' && mod.data) {
                            v21Html += `<p style="margin:6px 0;font-size:0.85rem;">本年${mod.data.yearType}，气至${mod.data.timing}</p>`;
                            v21Html += `<p style="margin:6px 0;font-size:0.85rem;color:#888;">${mod.data.adjustment}</p>`;
                        } else if (mod.code === 'Z' && mod.data) {
                            const layers = mod.data.layers.filter(l => l.level !== '正常');
                            for (const layer of layers) {
                                v21Html += `<p style="margin:4px 0;font-size:0.85rem;">${layer.level} · ${layer.name}：${layer.symptoms.slice(0,3).join('、')}...</p>`;
                            }
                        } else if (mod.code === 'AA' && mod.data) {
                            v21Html += `<p style="margin:6px 0;font-size:0.85rem;">${mod.data.year}年${mod.data.hua}，灾宫在${mod.data.direction}方（${mod.data.gong}宫）</p>`;
                            v21Html += `<p style="margin:6px 0;font-size:0.85rem;color:#888;">${mod.data.meaning}</p>`;
                        }
                        
                        v21Html += '</div>';
                    }
                    
                    v21Html += '</div>';
                    document.getElementById('v21Info').innerHTML = v21Html;
                }
            } catch (e) {
                console.error('V2.1分析出错:', e);
                document.getElementById('v21Info').innerHTML = '<p style="color:#c0392b;font-size:0.85rem;">V2.1分析出错: ' + e.message + '</p>';
            }
        }
    }
});
    </script>
</body>
</html>
